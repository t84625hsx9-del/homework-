name: Django CI

# 1. Когда запускать? (При пуше в main или создании PR)
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    # 2. На какой системе? (Актуальная версия Ubuntu)
    runs-on: ubuntu-latest

    steps:
      # 3. Копируем код из репозитория на сервер GitHub
      - name: Checkout code
        uses: actions/checkout@v4

      # 4. Устанавливаем Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # Укажи свою версию, если другая

      # 5. Устанавливаем зависимости
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install coverage  # Нужно для бонуса с Codecov

      # 6. Запускаем тесты и собираем статистику покрытия
      - name: Run Tests
        run: |
          coverage run --source='.' manage.py test
          coverage xml